<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if ok %}Pago registrado{% else %}PayPal{% endif %} — TecnoStock</title>
<style>
  body{font-family:Segoe UI,system-ui,sans-serif;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0B1120;color:#E2E8F0}
  .box{max-width:360px;padding:28px 24px;text-align:center}
  .icon{width:52px;height:52px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;margin-bottom:14px}
  .ok .icon{background:#166534;color:#fff}
  .err .icon{background:#991B1B;color:#fff}
  h1{font-size:1.05rem;margin:0 0 8px;font-weight:700}
  p{font-size:.9rem;color:#94A3B8;margin:0 0 18px;line-height:1.45}
  a{color:#93C5FD;font-size:.85rem}
</style>
</head>
<body class="{% if ok %}ok{% else %}err{% endif %}">
  <div class="box">
    <div class="icon">{% if ok %}✓{% else %}!{% endif %}</div>
    <h1>{% if ok %}Listo{% else %}Atención{% endif %}</h1>
    <p>{{ message }}</p>
    <p style="font-size:.78rem">Cerrando ventana…</p>
    <a href="{{ back_url }}">Si no se cierra, haz clic aquí</a>
  </div>
<script>
(function(){
  var back = "{{ back_url|escapejs }}";
  try {
    if (window.opener && !window.opener.closed) {
      window.opener.location.href = back;
      window.setTimeout(function(){ window.close(); }, 400);
      return;
    }
  } catch (e) {}
  window.location.href = back;
})();
</script>
</body>
</html>
