<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enlace no válido — TecnoStock S.A.</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Inter','Segoe UI',sans-serif;min-height:100vh;
    background:linear-gradient(150deg,#EEF0FF 0%,#DDE2FF 35%,#CDD5FF 65%,#BCC8FE 100%);
    display:flex;align-items:center;justify-content:center;padding:24px;
}
.card{
    background:#fff;border-radius:24px;max-width:420px;width:100%;
    box-shadow:0 24px 60px rgba(15,23,42,.14),0 4px 16px rgba(15,23,42,.08);
    padding:40px 36px;text-align:center;
}
.icon{width:64px;height:64px;margin:0 auto 18px;border-radius:50%;background:#FEF2F2;color:#DC2626;display:flex;align-items:center;justify-content:center;font-size:1.8rem}
h1{font-size:1.15rem;font-weight:800;color:#0F172A;margin-bottom:8px}
p{font-size:.875rem;color:#64748B;line-height:1.5}
</style>
</head>
<body>
<div class="card">
    <div class="icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
    <h1>Este enlace ya no es válido</h1>
    <p>El enlace para ver esta factura venció o no es correcto. Si necesitas una copia de tu factura, comunícate con TecnoStock S.A. y con gusto te la reenviamos.</p>
</div>
</body>
</html>
