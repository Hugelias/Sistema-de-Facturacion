{% extends 'base.html' %}
{% block title %}Eliminar Cliente{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-danger">
            <div class="card-header bg-danger text-white"><h5 class="mb-0">Confirmar Eliminación</h5></div>
            <div class="card-body text-center">
                <p class="fs-5">¿Eliminar el cliente <strong>{{ object.full_name }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Sí, eliminar</button>
                    <a href="{% url 'billing:customer_list' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
