<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Código de restablecimiento — TecnoStock S.A.</title>
</head>
<body style="margin:0;padding:0;background:#F1F5F9;font-family:Arial,Helvetica,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F1F5F9;padding:24px 0;">
<tr><td align="center">
<table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;">

    <!-- Header -->
    <tr>
        <td style="background:#0B1120;padding:24px 32px;">
            <span style="color:#ffffff;font-size:18px;font-weight:bold;">TecnoStock S.A.</span><br>
            <span style="color:#94A3B8;font-size:12px;">Restablecimiento de contraseña</span>
        </td>
    </tr>

    <!-- Greeting -->
    <tr>
        <td style="padding:28px 32px 0;">
            <p style="margin:0 0 4px;font-size:15px;color:#0F172A;">Hola <strong>{{ user.first_name|default:user.username }}</strong>,</p>
            <p style="margin:0 0 20px;font-size:14px;color:#64748B;">
                Usa el siguiente código para restablecer tu contraseña. Vence en {{ valid_minutes }} minutos.
            </p>
        </td>
    </tr>

    <!-- Code -->
    <tr>
        <td style="padding:0 32px;" align="center">
            <table role="presentation" cellpadding="0" cellspacing="0" style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:10px;width:100%;">
                <tr>
                    <td style="padding:22px;text-align:center;">
                        <span style="font-size:32px;letter-spacing:10px;font-weight:bold;color:#1D4ED8;font-family:'Courier New',monospace;">{{ code }}</span>
                    </td>
                </tr>
            </table>
        </td>
    </tr>

    <!-- Footer -->
    <tr>
        <td style="padding:24px 32px 32px;">
            <p style="margin:0;font-size:12px;color:#94A3B8;">
                Si tú no solicitaste este cambio, ignora este correo — tu contraseña seguirá siendo la misma.
            </p>
        </td>
    </tr>

</table>
</td></tr>
</table>
</body>
</html>
